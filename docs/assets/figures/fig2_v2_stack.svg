   <g id="text_2">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #444444" x="216.186563" y="72.261224" transform="rotate(-0 216.186563 72.261224)">x ∈ R^{N×5}  ·  edge_index ∈ Z^{2×E}  ·  edge_attr ∈ R^{E×4}  ·  batch</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: middle" x="216.186563" y="116.066173" transform="rotate(-0 216.186563 116.066173)">Embeddings</text>
   </g>
   <g id="text_4">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #444444" x="216.186563" y="123.24192" transform="rotate(-0 216.186563 123.24192)">node_emb 5→128  ·  edge_emb 4→128 (SiLU + LayerNorm)</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: middle" x="216.186563" y="191.994869" transform="rotate(-0 216.186563 191.994869)">GATv2 message passing × 4</text>
   </g>
   <g id="text_6">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #444444" transform="translate(49.789922 194.256756)">GATv2Conv (4 heads, edge-aware)  →  LayerNorm  →  GELU  →  + residual</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #444444" transform="translate(104.343281 204.334787)">h ∈ R^{N×128}; same edges reused every layer</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: middle" x="216.186563" y="267.813565" transform="rotate(-0 216.186563 267.813565)">to_dense_batch</text>
   </g>
   <g id="text_8">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #444444" x="216.186563" y="275.099311" transform="rotate(-0 216.186563 275.099311)">padded memory tokens  M ∈ R^{B×N_max×128}  + key padding mask</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'; text-anchor: middle" x="216.186563" y="334.089999" transform="rotate(-0 216.186563 334.089999)">TransformerDecoder × 2 (DETR-style)</text>
   </g>
   <g id="text_10">
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #444444" transform="translate(100.237031 336.101574)">K_max=64 learnable queries cross-attend to atoms</text>
    <text style="font-size: 9px; font-family: 'DejaVu Sans'; fill: #444444" transform="translate(126.351094 346.429918)">+ global pool concat  +  slot_refine MLP</text>
   </g>
   <g id="text_11">
